version: 2
project_name: chiliz

before:
  hooks:
    - go mod tidy

builds:
  - id: chiliz
    main: ./cmd/chiliz
    binary: chiliz
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/GrapeInTheTree/chiliz-cli/cmd/chiliz/cmd.version={{.Version}}
      - -X github.com/GrapeInTheTree/chiliz-cli/cmd/chiliz/cmd.commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: chiliz
    repository:
      owner: GrapeInTheTree
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: GitHub Actions
      email: actions@github.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/GrapeInTheTree/chiliz-cli"
    description: "The CLI for Chiliz Chain — validators, staking, tokens, contracts"
    license: MIT
    install: |
      bin.install "chiliz"
    test: |
      system "#{bin}/chiliz", "--help"
